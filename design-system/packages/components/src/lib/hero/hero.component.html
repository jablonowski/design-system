<section class="hero" [class.hero--bg-image]="backgroundImage">
  @if (backgroundImage) {
    <div class="hero-bg" [style.background-image]="'url(' + backgroundImage + ')'"></div>
    <div class="hero-bg-gradient"></div>
  }
  <div class="hero-container">
    <div class="hero-content">
      <h1>{{ heading }}</h1>
      @if (subtitle) {
        <p class="subtitle">{{ subtitle }}</p>
      }
      <div class="hero-body">
        <ng-content></ng-content>
      </div>
      <div class="hero-actions">
        <ng-content select="[heroActions]"></ng-content>
      </div>
    </div>
    @if (!backgroundImage) {
      <div class="hero-visual">
        <ng-content select="[heroVisual]"></ng-content>
      </div>
    }
  </div>
</section>
